
spring:
  application:
    name: distributed-url-shortener

  datasource:
    url: jdbc:mysql://localhost:3306/url_shortener
    username: root
    password: admin@12
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
    show-sql: false

  # redis:
  #   jedis:
  #     pool:
  #       max-active: 20
  #       max-idle: 10
  #       min-idle: 5
  #       max-wait: 2000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2000
      jedis:
        pool:
          max-idle: 10
          max-active: 20
          min-idle: 5
          max-wait: 2000

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: INFO
    com.urlshortener: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
  file:
    name: logs/url-shortener.log

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,metrics

app:
  shortener:
    base-url: http://localhost:8080/api
    cache-ttl-hours: 24
    rate-limit:
      enabled: true
      requests-per-minute: 1000
      burst-size: 100

